<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" role="img" aria-labelledby="title desc">
  <title id="title">Matriz RBAC</title>
  <desc id="desc">Matriz de autorização com roles admin, colaborador, visitante e anónimo.</desc>
  <rect width="1000" height="560" fill="#0f172a"/>
  <text x="50" y="58" fill="#f8fafc" font-family="Inter,Segoe UI,Arial" font-size="34" font-weight="900">Matriz de Autorização RBAC</text>
  <text x="50" y="88" fill="#94a3b8" font-family="Inter,Segoe UI,Arial" font-size="18">Prova de permitir/negar recursos por role, implementada com require_role().</text>
  <g font-family="Inter,Segoe UI,Arial" font-size="18">
    <rect x="60" y="130" width="880" height="360" rx="18" fill="#111827" stroke="#334155"/>
    <g fill="#1e293b">
      <rect x="60" y="130" width="880" height="60" rx="18"/>
      <rect x="60" y="190" width="880" height="1"/>
    </g>
    <text x="100" y="168" fill="#cbd5e1" font-weight="800">Endpoint</text>
    <text x="472" y="168" fill="#f87171" font-weight="800" text-anchor="middle">admin</text>
    <text x="614" y="168" fill="#60a5fa" font-weight="800" text-anchor="middle">colaborador</text>
    <text x="760" y="168" fill="#34d399" font-weight="800" text-anchor="middle">visitante</text>
    <text x="890" y="168" fill="#94a3b8" font-weight="800" text-anchor="middle">anónimo</text>
    <g fill="#94a3b8">
      <text x="100" y="226">GET /public</text>
      <text x="100" y="276">GET /me</text>
      <text x="100" y="326">GET /colaborador/data</text>
      <text x="100" y="376">GET /admin/users</text>
      <text x="100" y="426">GET /admin/mfa-area</text>
    </g>
    <g font-size="24" font-weight="900" text-anchor="middle">
      <text x="472" y="226" fill="#22c55e">200</text><text x="614" y="226" fill="#22c55e">200</text><text x="760" y="226" fill="#22c55e">200</text><text x="890" y="226" fill="#22c55e">200</text>
      <text x="472" y="276" fill="#22c55e">200</text><text x="614" y="276" fill="#22c55e">200</text><text x="760" y="276" fill="#22c55e">200</text><text x="890" y="276" fill="#ef4444">401</text>
      <text x="472" y="326" fill="#22c55e">200</text><text x="614" y="326" fill="#22c55e">200</text><text x="760" y="326" fill="#ef4444">403</text><text x="890" y="326" fill="#ef4444">401</text>
      <text x="472" y="376" fill="#22c55e">200</text><text x="614" y="376" fill="#ef4444">403</text><text x="760" y="376" fill="#ef4444">403</text><text x="890" y="376" fill="#ef4444">401</text>
      <text x="472" y="426" fill="#a78bfa">MFA</text><text x="614" y="426" fill="#ef4444">403</text><text x="760" y="426" fill="#ef4444">403</text><text x="890" y="426" fill="#ef4444">401</text>
    </g>
  </g>
  <text x="60" y="526" fill="#64748b" font-family="Inter,Segoe UI,Arial" font-size="15">Evidência: dashboard tab Autorização e endpoints FastAPI protegidos por role.</text>
</svg>
