<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" role="img" aria-labelledby="title desc">
  <title id="title">Evidências do dashboard</title>
  <desc id="desc">Composição visual com evidências de autenticação, auditoria, MFA e dashboard.</desc>
  <rect width="1000" height="560" fill="#0f172a"/>
  <text x="50" y="58" fill="#f8fafc" font-family="Inter,Segoe UI,Arial" font-size="34" font-weight="900">Evidências Consultáveis no Dashboard</text>
  <text x="50" y="88" fill="#94a3b8" font-family="Inter,Segoe UI,Arial" font-size="18">O painel demonstra autenticação, RBAC, JML, MFA e auditoria numa só interface.</text>
  <g font-family="Inter,Segoe UI,Arial">
    <rect x="60" y="132" width="400" height="170" rx="18" fill="#111827" stroke="#334155"/>
    <text x="90" y="172" fill="#f8fafc" font-size="22" font-weight="900">Sessão autenticada</text>
    <text x="90" y="210" fill="#94a3b8" font-size="17">preferred_username: colaborador.user</text>
    <text x="90" y="242" fill="#94a3b8" font-size="17">realm_access.roles: colaborador</text>
    <rect x="90" y="262" width="145" height="28" rx="14" fill="#2563eb"/>
    <text x="162" y="281" fill="white" font-size="14" font-weight="800" text-anchor="middle">TOKEN JWT</text>

    <rect x="540" y="132" width="400" height="170" rx="18" fill="#111827" stroke="#334155"/>
    <text x="570" y="172" fill="#f8fafc" font-size="22" font-weight="900">RBAC testável</text>
    <text x="570" y="210" fill="#22c55e" font-size="18" font-weight="800">GET /colaborador/data -> 200</text>
    <text x="570" y="244" fill="#ef4444" font-size="18" font-weight="800">GET /admin/users -> 403</text>
    <text x="570" y="276" fill="#f59e0b" font-size="16">Prova de permitir/negar por role</text>

    <rect x="60" y="338" width="400" height="170" rx="18" fill="#111827" stroke="#334155"/>
    <text x="90" y="378" fill="#f8fafc" font-size="22" font-weight="900">Auditoria</text>
    <text x="90" y="416" fill="#94a3b8" font-size="17">LOGIN, LOGIN_ERROR, LOGOUT</text>
    <text x="90" y="448" fill="#94a3b8" font-size="17">Admin events: JML / role changes</text>
    <rect x="90" y="468" width="280" height="18" rx="9" fill="#1e293b"/>
    <rect x="90" y="468" width="210" height="18" rx="9" fill="#3b82f6"/>

    <rect x="540" y="338" width="400" height="170" rx="18" fill="#111827" stroke="#334155"/>
    <text x="570" y="378" fill="#f8fafc" font-size="22" font-weight="900">MFA TOTP</text>
    <text x="570" y="416" fill="#94a3b8" font-size="17">admin.user tem CONFIGURE_TOTP</text>
    <text x="570" y="448" fill="#94a3b8" font-size="17">/admin/mfa-area exige amr/acr</text>
    <rect x="570" y="468" width="145" height="28" rx="14" fill="#7c3aed"/>
    <text x="642" y="487" fill="#ede9fe" font-size="14" font-weight="800" text-anchor="middle">OTP required</text>
  </g>
</svg>
