<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 640" role="img" aria-labelledby="title desc">
  <title id="title">Fluxo MFA/TOTP</title>
  <desc id="desc">Diagrama de sequência do fluxo de autenticação multi-fator TOTP obrigatório para admins.</desc>
  <rect width="1100" height="640" fill="#0f172a"/>
  <defs>
    <marker id="arr" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <path d="M0,0 L12,4 L0,8 Z" fill="#f59e0b"/>
    </marker>
    <marker id="arrp" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <path d="M0,0 L12,4 L0,8 Z" fill="#a78bfa"/>
    </marker>
    <marker id="arrg" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <path d="M0,0 L12,4 L0,8 Z" fill="#22c55e"/>
    </marker>
    <marker id="arrr" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <path d="M0,0 L12,4 L0,8 Z" fill="#ef4444"/>
    </marker>
    <style>
      text { font-family: Inter, Segoe UI, Arial, sans-serif; }
    </style>
  </defs>

  <!-- Title -->
  <text x="50" y="52" fill="#f8fafc" font-size="32" font-weight="900">Fluxo MFA / TOTP</text>
  <text x="50" y="82" fill="#94a3b8" font-size="16">Autenticação multi-fator obrigatória para role admin — TOTP verificado pelo Keycloak, acr/amr validado pelo FastAPI.</text>

  <!-- Actors -->
  <rect x="40" y="108" width="140" height="44" rx="10" fill="#1e293b" stroke="#475569"/>
  <text x="110" y="135" fill="#f8fafc" font-size="15" font-weight="700" text-anchor="middle">Admin / Browser</text>

  <rect x="280" y="108" width="140" height="44" rx="10" fill="#431407" stroke="#f97316"/>
  <text x="350" y="135" fill="#fed7aa" font-size="15" font-weight="700" text-anchor="middle">Auth. App (TOTP)</text>

  <rect x="530" y="108" width="140" height="44" rx="10" fill="#052e16" stroke="#22c55e"/>
  <text x="600" y="135" fill="#86efac" font-size="15" font-weight="700" text-anchor="middle">FastAPI :8000</text>

  <rect x="840" y="108" width="160" height="44" rx="10" fill="#1e1b4b" stroke="#8b5cf6"/>
  <text x="920" y="135" fill="#c4b5fd" font-size="15" font-weight="700" text-anchor="middle">Keycloak :8080</text>

  <!-- Lifelines -->
  <line x1="110" y1="152" x2="110" y2="610" stroke="#334155" stroke-width="1.5" stroke-dasharray="6 4"/>
  <line x1="350" y1="152" x2="350" y2="610" stroke="#334155" stroke-width="1.5" stroke-dasharray="6 4"/>
  <line x1="600" y1="152" x2="600" y2="610" stroke="#334155" stroke-width="1.5" stroke-dasharray="6 4"/>
  <line x1="920" y1="152" x2="920" y2="610" stroke="#334155" stroke-width="1.5" stroke-dasharray="6 4"/>

  <!-- Step 1 -->
  <line x1="111" y1="195" x2="589" y2="195" stroke="#f59e0b" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="220" y="178" width="260" height="22" rx="4" fill="#0f172a"/>
  <text x="350" y="193" fill="#fbbf24" font-size="13" text-anchor="middle">① POST /auth/token {admin.user, pass}</text>

  <!-- Step 2 -->
  <line x1="601" y1="228" x2="909" y2="228" stroke="#f59e0b" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="660" y="211" width="195" height="22" rx="4" fill="#0f172a"/>
  <text x="757" y="226" fill="#fbbf24" font-size="13" text-anchor="middle">② POST /token (KC grant)</text>

  <!-- Step 3: KC requires OTP challenge -->
  <rect x="840" y="248" width="160" height="30" rx="8" fill="#2e1065" stroke="#7c3aed"/>
  <text x="920" y="267" fill="#ddd6fe" font-size="12" font-weight="700" text-anchor="middle">③ Requer TOTP challenge</text>

  <!-- Step 4: KC → Browser: needs OTP -->
  <line x1="908" y1="298" x2="601" y2="298" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrp)"/>
  <rect x="660" y="281" width="200" height="22" rx="4" fill="#0f172a"/>
  <text x="760" y="296" fill="#c4b5fd" font-size="13" text-anchor="middle">④ 401 — OTP obrigatório</text>

  <line x1="599" y1="298" x2="122" y2="298" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrp)"/>
  <rect x="260" y="281" width="215" height="22" rx="4" fill="#0f172a"/>
  <text x="368" y="296" fill="#c4b5fd" font-size="13" text-anchor="middle">④ 401 — OTP obrigatório</text>

  <!-- Step 5: Browser asks Auth App for OTP -->
  <line x1="111" y1="338" x2="339" y2="338" stroke="#f59e0b" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="135" y="321" width="175" height="22" rx="4" fill="#0f172a"/>
  <text x="222" y="336" fill="#fbbf24" font-size="13" text-anchor="middle">⑤ Solicita código TOTP</text>

  <!-- Step 6: Auth App generates OTP -->
  <rect x="288" y="355" width="124" height="30" rx="8" fill="#431407" stroke="#f97316"/>
  <text x="350" y="374" fill="#fed7aa" font-size="12" font-weight="700" text-anchor="middle">⑥ Gera OTP (HMAC)</text>

  <!-- Step 7: Auth App → Browser: OTP code -->
  <line x1="349" y1="398" x2="122" y2="398" stroke="#f97316" stroke-width="2" marker-end="url(#arrr)"/>
  <rect x="150" y="381" width="160" height="22" rx="4" fill="#0f172a"/>
  <text x="230" y="396" fill="#fdba74" font-size="13" text-anchor="middle">⑦ Código OTP (6 dígitos)</text>

  <!-- Step 8: Browser → FastAPI: retry with OTP -->
  <line x1="111" y1="438" x2="589" y2="438" stroke="#f59e0b" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="175" y="421" width="295" height="22" rx="4" fill="#0f172a"/>
  <text x="323" y="436" fill="#fbbf24" font-size="13" text-anchor="middle">⑧ POST /auth/token {user, pass, totp}</text>

  <!-- Step 9: FastAPI → KC with OTP -->
  <line x1="601" y1="472" x2="909" y2="472" stroke="#f59e0b" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="635" y="455" width="230" height="22" rx="4" fill="#0f172a"/>
  <text x="750" y="470" fill="#fbbf24" font-size="13" text-anchor="middle">⑨ POST /token {pass + totp_secret}</text>

  <!-- Step 10: KC validates OTP, issues JWT with acr=otp -->
  <line x1="908" y1="508" x2="601" y2="508" stroke="#22c55e" stroke-width="2" marker-end="url(#arrg)"/>
  <rect x="600" y="491" width="270" height="22" rx="4" fill="#0f172a"/>
  <text x="735" y="506" fill="#86efac" font-size="13" text-anchor="middle">⑩ JWT com acr=otp / amr=[otp]</text>

  <!-- Step 11: FastAPI checks acr/amr -->
  <rect x="535" y="523" width="135" height="30" rx="8" fill="#064e3b" stroke="#10b981"/>
  <text x="602" y="542" fill="#6ee7b7" font-size="12" font-weight="700" text-anchor="middle">⑪ require_mfa() OK</text>

  <!-- Step 12: 200 to Browser -->
  <line x1="599" y1="570" x2="122" y2="570" stroke="#22c55e" stroke-width="2" marker-end="url(#arrg)"/>
  <rect x="220" y="553" width="265" height="22" rx="4" fill="#0f172a"/>
  <text x="353" y="568" fill="#86efac" font-size="13" text-anchor="middle">⑫ 200 OK {access_token com MFA}</text>

  <!-- Legend -->
  <line x1="40" y1="618" x2="70" y2="618" stroke="#f59e0b" stroke-width="2"/>
  <text x="76" y="622" fill="#94a3b8" font-size="12">Request</text>
  <line x1="155" y1="618" x2="185" y2="618" stroke="#a78bfa" stroke-width="2"/>
  <text x="191" y="622" fill="#94a3b8" font-size="12">Desafio KC</text>
  <line x1="285" y1="618" x2="315" y2="618" stroke="#f97316" stroke-width="2"/>
  <text x="321" y="622" fill="#94a3b8" font-size="12">OTP App</text>
  <line x1="390" y1="618" x2="420" y2="618" stroke="#22c55e" stroke-width="2"/>
  <text x="426" y="622" fill="#94a3b8" font-size="12">Sucesso (MFA)</text>
</svg>
