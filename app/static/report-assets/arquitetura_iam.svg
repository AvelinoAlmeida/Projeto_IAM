<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" role="img" aria-labelledby="title desc">
  <title id="title">Arquitetura IAM do projeto</title>
  <desc id="desc">Diagrama com browser, FastAPI, Keycloak e PostgreSQL, mostrando validação JWT, OIDC e Admin API.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#020617" flood-opacity=".35"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <path d="M0,0 L12,4 L0,8 Z" fill="#60a5fa"/>
    </marker>
    <style>
      text{font-family:Inter,Segoe UI,Arial,sans-serif}
      .box{filter:url(#shadow);stroke-width:2;rx:22}
      .label{fill:#e5e7eb;font-size:28px;font-weight:800}
      .sub{fill:#94a3b8;font-size:18px}
      .mini{fill:#cbd5e1;font-size:16px}
      .flow{stroke:#60a5fa;stroke-width:4;fill:none;marker-end:url(#arrow)}
      .flow2{stroke:#34d399;stroke-width:4;fill:none;marker-end:url(#arrow);stroke-dasharray:9 8}
    </style>
  </defs>
  <rect width="1000" height="560" fill="url(#bg)"/>
  <text x="50" y="58" fill="#f8fafc" font-size="34" font-weight="900">Arquitetura da Solução IAM</text>
  <text x="50" y="88" fill="#94a3b8" font-size="18">Keycloak como IdP/SSO, FastAPI como aplicação protegida e PostgreSQL como base do realm.</text>

  <rect class="box" x="62" y="185" width="190" height="138" fill="#172554" stroke="#3b82f6"/>
  <text class="label" x="157" y="240" text-anchor="middle">Browser</text>
  <text class="sub" x="157" y="272" text-anchor="middle">Dashboard / Cliente</text>
  <text class="mini" x="157" y="300" text-anchor="middle">localhost:8000</text>

  <rect class="box" x="405" y="145" width="205" height="160" fill="#064e3b" stroke="#10b981"/>
  <text class="label" x="508" y="205" text-anchor="middle">FastAPI</text>
  <text class="sub" x="508" y="238" text-anchor="middle">JWT RS256 + RBAC</text>
  <text class="mini" x="508" y="268" text-anchor="middle">/auth /me /admin /jml</text>

  <rect class="box" x="405" y="370" width="205" height="125" fill="#312e81" stroke="#8b5cf6"/>
  <text class="label" x="508" y="420" text-anchor="middle">Keycloak</text>
  <text class="sub" x="508" y="452" text-anchor="middle">Realm iam-tp</text>
  <text class="mini" x="508" y="480" text-anchor="middle">OIDC / Admin API</text>

  <rect class="box" x="750" y="370" width="190" height="125" fill="#1e293b" stroke="#38bdf8"/>
  <text class="label" x="845" y="420" text-anchor="middle">PostgreSQL</text>
  <text class="sub" x="845" y="452" text-anchor="middle">Keycloak DB</text>
  <text class="mini" x="845" y="480" text-anchor="middle">users, roles, events</text>

  <path class="flow" d="M252 254 C310 235 350 225 405 225"/>
  <text x="320" y="206" fill="#bfdbfe" font-size="18" font-weight="700" text-anchor="middle">Bearer JWT</text>

  <path class="flow2" d="M508 305 L508 370"/>
  <text x="532" y="344" fill="#bbf7d0" font-size="17" font-weight="700">JWKS + Admin API</text>

  <path class="flow" d="M610 433 L750 433"/>
  <text x="682" y="410" fill="#bae6fd" font-size="17" font-weight="700" text-anchor="middle">JDBC interno</text>

  <path class="flow" d="M252 285 C315 350 345 410 405 433"/>
  <text x="312" y="383" fill="#c4b5fd" font-size="17" font-weight="700" text-anchor="middle">OIDC login</text>

  <rect x="62" y="420" width="250" height="75" rx="16" fill="#0f172a" stroke="#334155"/>
  <text x="86" y="450" fill="#f8fafc" font-size="17" font-weight="800">Evidência de infraestrutura</text>
  <text x="86" y="476" fill="#94a3b8" font-size="15">docker compose inicia app, Keycloak e Postgres.</text>
</svg>
